<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日程調整</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">日程調整</div>
      <div class="status" id="status">準備中</div>
    </div>
  </header>

  <main class="wrap main">
    <section id="createView" class="layout">
      <aside class="panel form-panel">
        <div class="panel-head">
          <h1>イベント作成</h1>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="titleInput">イベント名</label>
            <input id="titleInput" type="text" placeholder="例：懇親会">
          </div>

          <div class="field">
            <label for="memoInput">メモ</label>
            <textarea id="memoInput" placeholder="場所、補足事項など"></textarea>
          </div>

          <div class="field">
            <label for="candidatesInput">候補日</label>
            <textarea id="candidatesInput" placeholder="7/15（水）18:30〜&#10;7/18（土）19:00〜"></textarea>
            <div class="hint">1行につき1件入力してください。</div>
          </div>

          <div class="actions">
            <button class="btn primary" id="createBtn" type="button">作成</button>
            <button class="btn subtle" id="clearBtn" type="button">入力を消す</button>
          </div>
        </div>
      </aside>

      <section class="panel preview-panel">
        <div class="panel-head">
          <h2>プレビュー</h2>
        </div>
        <div class="panel-body" id="previewArea">
          <div class="empty">イベント名と候補日を入力してください。</div>
        </div>
      </section>
    </section>

    <section id="eventView" class="hidden">
      <article class="panel event-panel">
        <div class="panel-head">
          <h1 id="eventTitle">イベント</h1>
          <small id="eventMeta"></small>
        </div>
        <div class="panel-body">
          <p class="memo" id="eventMemo"></p>

          <div class="share">
            <input id="shareUrl" type="text" readonly aria-label="共有URL">
            <button class="btn" id="copyBtn" type="button">URLをコピー</button>
          </div>

          <div class="answer-list" id="answerArea"></div>

          <div class="two-columns">
            <div class="field no-margin">
              <label for="nameInput">名前</label>
              <input id="nameInput" type="text" placeholder="例：Yamada">
            </div>
            <div class="field no-margin">
              <label for="commentInput">コメント</label>
              <input id="commentInput" type="text" placeholder="任意">
            </div>
          </div>

          <div class="actions">
            <button class="btn primary" id="submitBtn" type="button">回答する</button>
            <button class="btn" id="csvBtn" type="button">CSV出力</button>
            <button class="btn" id="newBtn" type="button">新規作成</button>
          </div>
        </div>
      </article>

      <article class="panel result-panel">
        <div class="panel-head">
          <h2>回答状況</h2>
        </div>
        <div class="panel-body" id="resultArea">
          <div class="empty">まだ回答がありません。</div>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
